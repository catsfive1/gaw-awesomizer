<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GAW Awesomizer</title>
<style>
  :root {
    --bg: #111; --bg2: #1a1a1a; --bg3: #242424; --border: #2a2a2a;
    --text: #E0E0E0; --text2: #888; --text3: #555;
    --accent: #4A9EFF; --green: #34C759; --red: #FF453A; --warn: #FF9F0A;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; width: 280px; background: var(--bg); color: var(--text);
    font: 13px -apple-system, system-ui, sans-serif;
  }
  .header {
    display: flex; align-items: center; gap: 10px; padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .header img { width: 32px; height: 32px; border-radius: 8px; }
  .header .title { font-weight: 700; font-size: 15px; }
  .header .version { color: var(--text3); font-size: 10px; }
  .body { padding: 14px 16px; }
  .row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
  }
  .stat { text-align: center; flex: 1; background: var(--bg2); border-radius: 8px; padding: 8px 4px; margin: 0 3px; }
  .stat b { display: block; font-size: 17px; color: var(--accent); }
  .stat span { font-size: 9px; color: var(--text3); text-transform: uppercase; }
  .stats-row { display: flex; margin: 4px -3px 10px; }
  .toggle {
    width: 36px; height: 20px; appearance: none; background: var(--bg2);
    border-radius: 10px; position: relative; cursor: pointer; border: 1px solid var(--border);
  }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px;
    background: var(--text2); border-radius: 50%; transition: all .15s;
  }
  .toggle:checked { background: var(--green); border-color: var(--green); }
  .toggle:checked::after { left: 17px; background: #fff; }
  .btn {
    width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text);
    padding: 9px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
    margin-top: 8px;
  }
  .btn:hover { background: var(--bg3); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { filter: brightness(1.1); }
  .empty { text-align: center; padding: 20px 8px; color: var(--text2); font-size: 12px; line-height: 1.5; }
  .footer { padding: 8px 16px; border-top: 1px solid var(--border); text-align: center; font-size: 10px; color: var(--text3); }
</style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="">
    <div>
      <div class="title">GAW Awesomizer</div>
      <div class="version" id="version"></div>
    </div>
  </div>
  <div class="body" id="body">
    <div class="empty">Checking GAW / PDW…</div>
  </div>
  <div class="footer">Power User for GAW + PDW</div>
  <script src="popup.js"></script>
</body>
</html>
